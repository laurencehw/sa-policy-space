name: Update All Data Sources
on:
  schedule:
    - cron: "0 6 * * 1"
    - cron: "0 7 1 * *"
    - cron: "0 8 1 3,10 *"
  workflow_dispatch:
    inputs:
      sources:
        description: "Which sources to run"
        required: true
        type: choice
        options: [all, pmg, budgets, municipal, research]
        default: "all"
      dry_run:
        description: "Dry run (no DB writes)"
        required: false
        type: boolean
        default: false
      pmg_days:
        description: "PMG: days to look back"
        required: false
        default: "30"
      budget_year:
        description: "Vulekamali: financial year (e.g. 2025-26)"
        required: false
        default: ""
jobs:
  update-pmg:
    if: >-
      github.event_name == 'workflow_dispatch' && (github.event.inputs.sources == 'all' || github.event.inputs.sources == 'pmg') || (github.event_name == 'schedule' && github.event.schedule == '0 6 * * 1')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.11" }
      - run: pip install -r requirements-scripts.txt
      - name: Update PMG meetings
        env: { SUPABASE_URL: "${{ secrets.SUPABASE_URL }}", SUPABASE_KEY: "${{ secrets.SUPABASE_KEY }}" }
        run: |
          DAYS="${{ github.event.inputs.pmg_days || '30' }}"
          CMD="python scripts/update_meetings.py --days $DAYS"
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then CMD="$CMD --dry-run"; fi
          echo "Running: $CMD" && $CMD
  update-budgets:
    if: >-
      github.event_name == 'workflow_dispatch' && (github.event.inputs.sources == 'all' || github.event.inputs.sources == 'budgets') || (github.event_name == 'schedule' && github.event.schedule == '0 8 1 3,10 *')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.11" }
      - run: pip install -r requirements-scripts.txt
      - name: Update Vulekamali budget data
        env: { SUPABASE_URL: "${{ secrets.SUPABASE_URL }}", SUPABASE_KEY: "${{ secrets.SUPABASE_KEY }}" }
        run: |
          YEAR="${{ github.event.inputs.budget_year }}"
          CMD="python scripts/update_budgets.py"
          if [ -n "$YEAR" ]; then CMD="$CMD --year $YEAR"; fi
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then CMD="$CMD --dry-run"; fi
          echo "Running: $CMD" && $CMD
  update-municipal:
    if: >-
      github.event_name == 'workflow_dispatch' && (github.event.inputs.sources == 'all' || github.event.inputs.sources == 'municipal') || (github.event_name == 'schedule' && github.event.schedule == '0 7 1 * *')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.11" }
      - run: pip install -r requirements-scripts.txt
      - name: Update municipal finance data
        env: { SUPABASE_URL: "${{ secrets.SUPABASE_URL }}", SUPABASE_KEY: "${{ secrets.SUPABASE_KEY }}" }
        run: |
          CMD="python scripts/update_municipal.py"
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then CMD="$CMD --dry-run"; fi
          echo "Running: $CMD" && $CMD
  update-research:
    if: >-
      github.event_name == 'workflow_dispatch' && (github.event.inputs.sources == 'all' || github.event.inputs.sources == 'research') || (github.event_name == 'schedule' && github.event.schedule == '0 6 * * 1')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.11" }
      - run: pip install -r requirements-scripts.txt
      - name: Update EconRSA research papers
        env: { SUPABASE_URL: "${{ secrets.SUPABASE_URL }}", SUPABASE_KEY: "${{ secrets.SUPABASE_KEY }}" }
        run: |
          CMD="python scripts/update_research_papers.py --enrich"
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then CMD="$CMD --dry-run"; fi
          echo "Running: $CMD" && $CMD
